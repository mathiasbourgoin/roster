name: CI

# Enforce the harness guards on every push/PR. `npm test` chains: TypeScript build,
# node:test suites (build-index, run-hook), check-agents / check-skill-structure /
# check-hook-structure / check-kb-links / check-recruiter-sync / check-pipeline-install,
# and `sync-harness.sh --check` (source↔projection drift). A red check blocks the merge —
# this is what makes "deterministic and guarded" true rather than aspirational.
#
# `npm run test:review-bundle` runs separately, right after `npm test` (F-10,
# specs/review-tool-distribution.md) — the review-bundle scratch install/upgrade/removal
# integration test is heavier than the rest of the suite (real curl/file:// fetches, real
# tool invocations) and follows the test-install.sh precedent of staying out of the main chain.

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so check-leak-diff can diff against the base ref
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify guard prerequisites (jq + bash>=4)
        run: |
          jq --version
          bash --version | head -1
      - run: npm ci
      - run: npm test
      - name: Review bundle scratch install/upgrade/removal (F-10 — outside the npm test chain)
        run: npm run test:review-bundle
      - name: Verify skill manifest is current (H16 — prevent populate-manifest-skills drift)
        run: node scripts/populate-manifest-skills.js --check
      - name: Leak scan changed files (enforce check-leak via git diff, not agent-supplied)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            bash scripts/check-leak-diff.sh "origin/${{ github.base_ref }}"
          else
            bash scripts/check-leak-diff.sh "${{ github.event.before }}"
          fi
